name: Build and Release

on:
    push:
        branches: [ "main" ]
        tags: [ "v*.*.*", "v*" ]
    pull_request:
        branches: [ "main" ]

permissions:
    contents: write

jobs:
    build:
        name: Build Cross-Platform
        runs-on: ubuntu-latest
        strategy:
            matrix:
                goos: [ linux, darwin, freebsd ]
                goarch: [ amd64, arm64 ]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.21"

            - name: Build Binary
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
              run: |
                  mkdir -p build
                  go build -o build/wpvul-${{ matrix.goos }}-${{ matrix.goarch }} main.go

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wpvul-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: build/wpvul-${{ matrix.goos }}-${{ matrix.goarch }}

    release:
        name: Create GitHub Release
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        steps:
            - name: Download All Artifacts
              uses: actions/download-artifact@v4
              with:
                  path: build-artifacts

            - name: Prepare Files for Release
              run: |
                  mkdir release-binaries
                  # Github actions artifact downloader creates a folder per artifact
                  for dir in build-artifacts/*; do
                    mv "$dir"/* release-binaries/
                  done

            - name: Publish Release to GitHub
              uses: softprops/action-gh-release@v2
              with:
                  files: release-binaries/*
                  generate_release_notes: true
