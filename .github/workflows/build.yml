name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Cross-Platform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, freebsd]
        goarch: [amd64, arm64]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          go build -o build/wpvul-${{ matrix.goos }}-${{ matrix.goarch }} main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpvul-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/wpvul-${{ matrix.goos }}-${{ matrix.goarch }}
